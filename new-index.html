<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1628;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1a2a4a;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #0078D4;
        }
        .logo span { color: white; }
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status.online {
            background: #1a3a2a;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .status.offline {
            background: #3a1a1a;
            color: #f44336;
            border: 1px solid #f44336;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: #111d33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #1a2a4a;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #0078D4;
        }
        .stat-card .label {
            font-size: 14px;
            color: #8899bb;
            margin-top: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #111d33;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #1a2a4a;
        }
        .card h3 {
            color: #8899bb;
            margin-bottom: 15px;
        }
        .user-item, .result-item {
            padding: 10px;
            border-bottom: 1px solid #1a2a4a;
            display: flex;
            justify-content: space-between;
        }
        .user-item:last-child, .result-item:last-child {
            border-bottom: none;
        }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #8899bb;
        }
        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Phish<span>Guard</span></div>
            <div id="status" class="status offline">⏳ Checking...</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="quizzes">-</div>
                <div class="label">Quizzes Taken</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avg">-</div>
                <div class="label">Average Score</div>
            </div>
            <div class="stat-card">
                <div class="number" id="best">-</div>
                <div class="label">Best Score</div>
            </div>
            <div class="stat-card">
                <div class="number" id="completed">-</div>
                <div class="label">Completed</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📊 Recent Results</h3>
                <div id="results"><div class="loading">Loading...</div></div>
            </div>
            <div class="card">
                <h3>👥 Users</h3>
                <div id="users"><div class="loading">Loading...</div></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';

        async function loadData() {
            const statusEl = document.getElementById('status');

            try {
                // Check backend
                const health = await fetch(API + '/api/healthz');
                if (!health.ok) throw new Error('Backend not responding');
                statusEl.textContent = '✅ Online';
                statusEl.className = 'status online';

                // Load dashboard
                const dashRes = await fetch(API + '/api/dashboard');
                const dash = await dashRes.json();

                document.getElementById('quizzes').textContent = dash.stats.quizzesTaken || 0;
                document.getElementById('avg').textContent = (dash.stats.averageScore || 0) + '%';
                document.getElementById('best').textContent = (dash.stats.bestScore || 0) + '%';
                document.getElementById('completed').textContent = (dash.stats.completed || 0) + '%';

                // Results
                const resultsDiv = document.getElementById('results');
                if (dash.recentResults && dash.recentResults.length > 0) {
                    resultsDiv.innerHTML = '';
                    dash.recentResults.forEach(r => {
                        const d = document.createElement('div');
                        d.className = 'result-item';
                        const pass = r.score >= 70 ? 'pass' : 'fail';
                        d.innerHTML = `<span>Quiz ${r.quizId || 'N/A'}</span><span class="${pass}">${r.score}%</span>`;
                        resultsDiv.appendChild(d);
                    });
                } else {
                    resultsDiv.innerHTML = '<div style="color:#8899bb;text-align:center;padding:20px;">No results yet</div>';
                }

                // Load users
                const usersRes = await fetch(API + '/api/users');
                const users = await usersRes.json();
                const usersDiv = document.getElementById('users');
                if (users && users.length > 0) {
                    usersDiv.innerHTML = '';
                    users.forEach(u => {
                        const d = document.createElement('div');
                        d.className = 'user-item';
                        d.innerHTML = `<span>${u.username}</span><span style="color:#8899bb;font-size:14px;">${u.email}</span>`;
                        usersDiv.appendChild(d);
                    });
                } else {
                    usersDiv.innerHTML = '<div style="color:#8899bb;text-align:center;padding:20px;">No users</div>';
                }

            } catch (error) {
                statusEl.textContent = '❌ Offline';
                statusEl.className = 'status offline';
                document.getElementById('results').innerHTML = '<div style="color:#f44336;text-align:center;padding:20px;">❌ Cannot connect to backend</div>';
                document.getElementById('users').innerHTML = '<div style="color:#f44336;text-align:center;padding:20px;">❌ Cannot connect to backend</div>';
                console.error('Error:', error);
            }
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
