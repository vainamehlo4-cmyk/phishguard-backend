openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PhishGuard - Phishing Awareness and User Risk Assessment API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: phishing
    description: Phishing simulations
  - name: training
    description: Awareness training
  - name: risk
    description: Risk scoring
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/change-password:
    put:
      operationId: changePassword
      tags: [auth]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Invalid current password

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithRisk"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithRisk"
        "404":
          description: Not found

  /phishing/emails:
    get:
      operationId: listPhishingEmails
      tags: [phishing]
      summary: List phishing simulation emails
      responses:
        "200":
          description: List of phishing emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhishingEmail"
    post:
      operationId: createPhishingEmail
      tags: [phishing]
      summary: Create a phishing simulation (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingEmailInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingEmail"

  /phishing/emails/{id}/action:
    post:
      operationId: recordPhishingAction
      tags: [phishing]
      summary: Record user action on a phishing email
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhishingActionInput"
      responses:
        "200":
          description: Action recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingAction"

  /phishing/actions:
    get:
      operationId: listPhishingActions
      tags: [phishing]
      summary: List all phishing actions (admin)
      responses:
        "200":
          description: List of actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhishingAction"

  /phishing/my-actions:
    get:
      operationId: listMyPhishingActions
      tags: [phishing]
      summary: List current user's phishing actions
      responses:
        "200":
          description: My actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhishingAction"

  /training/modules:
    get:
      operationId: listTrainingModules
      tags: [training]
      summary: List training modules
      responses:
        "200":
          description: List of training modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingModule"

  /training/modules/{id}/complete:
    post:
      operationId: completeTrainingModule
      tags: [training]
      summary: Mark a training module as complete
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingCompletion"

  /training/my-completions:
    get:
      operationId: listMyCompletions
      tags: [training]
      summary: Get current user's training completions
      responses:
        "200":
          description: Completions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingCompletion"

  /risk/my-score:
    get:
      operationId: getMyRiskScore
      tags: [risk]
      summary: Get current user's risk score
      responses:
        "200":
          description: Risk score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScore"

  /risk/users:
    get:
      operationId: getRiskUsers
      tags: [risk]
      summary: Get all users with risk scores (admin)
      responses:
        "200":
          description: Users with risk scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithRisk"

  /dashboard/user:
    get:
      operationId: getUserDashboard
      tags: [dashboard]
      summary: Get user dashboard summary
      responses:
        "200":
          description: User dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboard"

  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [phishing]
      summary: List phishing campaigns (admin)
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [phishing]
      summary: Create a phishing campaign (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [phishing]
      summary: Get a campaign by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found

  /campaigns/{id}/launch:
    put:
      operationId: launchCampaign
      tags: [phishing]
      summary: Launch a campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign launched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/cancel:
    put:
      operationId: cancelCampaign
      tags: [phishing]
      summary: Cancel a campaign
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        department:
          type: ["string", "null"]
        createdAt:
          type: string

    UserWithRisk:
      type: object
      required: [id, username, email, role, riskScore, riskLevel, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        department:
          type: ["string", "null"]
        riskScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high]
        clickCount:
          type: integer
        reportCount:
          type: integer
        ignoreCount:
          type: integer
        trainingCompleted:
          type: integer
        createdAt:
          type: string

    PhishingEmail:
      type: object
      required: [id, subject, sender, previewText, difficulty, sentAt]
      properties:
        id:
          type: integer
        subject:
          type: string
        sender:
          type: string
        previewText:
          type: string
        body:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        sentAt:
          type: string
        myAction:
          type: ["string", "null"]

    PhishingEmailInput:
      type: object
      required: [subject, sender, previewText, body, difficulty]
      properties:
        subject:
          type: string
        sender:
          type: string
        previewText:
          type: string
        body:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]

    PhishingActionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [click, report, ignore]

    PhishingAction:
      type: object
      required: [id, userId, phishingEmailId, action, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: ["string", "null"]
        phishingEmailId:
          type: integer
        emailSubject:
          type: ["string", "null"]
        action:
          type: string
          enum: [click, report, ignore]
        createdAt:
          type: string

    TrainingModule:
      type: object
      required: [id, title, description, category, durationMinutes, completed]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        content:
          type: string
        durationMinutes:
          type: integer
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]

    TrainingCompletion:
      type: object
      required: [id, userId, moduleId, completedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        moduleId:
          type: integer
        moduleTitle:
          type: ["string", "null"]
        completedAt:
          type: string

    RiskScore:
      type: object
      required: [userId, score, level, clickCount, reportCount, ignoreCount, trainingCompleted]
      properties:
        userId:
          type: integer
        score:
          type: integer
        level:
          type: string
          enum: [low, medium, high]
        clickCount:
          type: integer
        reportCount:
          type: integer
        ignoreCount:
          type: integer
        trainingCompleted:
          type: integer

    UserDashboard:
      type: object
      required: [user, riskScore, recentActions, trainingProgress, pendingEmails]
      properties:
        user:
          $ref: "#/components/schemas/User"
        riskScore:
          $ref: "#/components/schemas/RiskScore"
        recentActions:
          type: array
          items:
            $ref: "#/components/schemas/PhishingAction"
        trainingProgress:
          type: object
          required: [completed, total]
          properties:
            completed:
              type: integer
            total:
              type: integer
        pendingEmails:
          type: integer

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    SuccessResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    Campaign:
      type: object
      required: [id, name, description, status, scheduledAt, emailCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [scheduled, active, completed, cancelled]
        targetDepartment:
          type: ["string", "null"]
        scheduledAt:
          type: string
        emailCount:
          type: integer
        createdByName:
          type: ["string", "null"]
        createdAt:
          type: string

    CampaignInput:
      type: object
      required: [name, scheduledAt]
      properties:
        name:
          type: string
        description:
          type: string
        targetDepartment:
          type: string
        scheduledAt:
          type: string
        emailIds:
          type: array
          items:
            type: integer

    AdminDashboard:
      type: object
      required: [totalUsers, highRiskCount, mediumRiskCount, lowRiskCount, totalSimulations, totalClicks, totalReports, totalIgnores, recentActions, riskDistribution]
      properties:
        totalUsers:
          type: integer
        highRiskCount:
          type: integer
        mediumRiskCount:
          type: integer
        lowRiskCount:
          type: integer
        totalSimulations:
          type: integer
        totalClicks:
          type: integer
        totalReports:
          type: integer
        totalIgnores:
          type: integer
        recentActions:
          type: array
          items:
            $ref: "#/components/schemas/PhishingAction"
        riskDistribution:
          type: array
          items:
            type: object
            required: [level, count]
            properties:
              level:
                type: string
              count:
                type: integer
