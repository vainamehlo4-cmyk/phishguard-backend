kind = "web"
previewPath = "/"
title = "PhishGuard"
version = "1.0.0"
id = "artifacts/phishguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23450

[services.development]
run = "pnpm --filter @workspace/phishguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phishguard", "run", "build" ]
publicDir = "artifacts/phishguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23450"
BASE_PATH = "/"
