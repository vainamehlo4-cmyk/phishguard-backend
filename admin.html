<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard - Admin</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">Phish<span>Guard</span></div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="training.html">Training</a>
                <a href="quiz.html">Quiz</a>
                <a href="results.html">Results</a>
                <a href="profile.html">Profile</a>
                <a href="admin.html" class="active">Admin</a>
                <span class="user-info" id="username-display">User</span>
                <button class="logout" onclick="logout()">Logout</button>
            </div>
        </nav>
        <div class="card">
            <h2>🔐 Admin Panel</h2>
            <div id="admin-login-status" style="color:#8899bb;margin-bottom:15px;">🔒 Enter password to unlock</div>
            <div id="admin-content">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <input type="password" id="admin-password" placeholder="Enter admin password" style="flex:1;min-width:200px;">
                    <button onclick="adminLogin()" style="background:#2a5c2a;">Unlock</button>
                </div>
                <div id="admin-message" style="margin-top:10px;"></div>
            </div>
            <div id="admin-panel" style="display:none; margin-top:20px; border-top:1px solid #1a2a4a; padding-top:20px;">
                <div id="admin-stats" style="margin-bottom:20px; color:#8899bb;"></div>
                
                <!-- Charts Section -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div style="background:#0a1628; padding:15px; border-radius:8px; border:1px solid #1a2a4a;">
                        <h4 style="color:#8899bb; text-align:center; margin-bottom:10px;">📊 Average Score by User</h4>
                        <canvas id="avgScoreChart" height="200"></canvas>
                    </div>
                    <div style="background:#0a1628; padding:15px; border-radius:8px; border:1px solid #1a2a4a;">
                        <h4 style="color:#8899bb; text-align:center; margin-bottom:10px;">🎯 Overall Pass/Fail Ratio</h4>
                        <canvas id="passFailChart" height="200"></canvas>
                    </div>
                </div>
                
                <h3>👥 User Progress Table</h3>
                <div id="admin-users" style="margin-top:10px; overflow-x:auto;">
                    <div class="loading-text">Loading users...</div>
                </div>
                
                <hr style="border-color:#1a2a4a; margin:20px 0;">
                <button onclick="generateReport()" style="background:#0078D4; padding:10px 24px; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer;">📊 Generate Full Report</button>
                <div id="report-container" style="margin-top:20px; display:none; background:#0a1628; padding:20px; border-radius:8px; border:1px solid #1a2a4a;">
                    <h3>📋 Full Progress Report</h3>
                    <div id="report-content"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
